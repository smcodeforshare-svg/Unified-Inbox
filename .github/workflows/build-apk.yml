name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-wrapper/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      working-directory: ./android-wrapper
      run: gradle assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Unified-Inbox-APK
        path: android-wrapper/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Build Release APK
      working-directory: ./android-wrapper
      run: gradle assembleRelease --no-daemon --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Unified-Inbox-Release-APK
        path: android-wrapper/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: error
