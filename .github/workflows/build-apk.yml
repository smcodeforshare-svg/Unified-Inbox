name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-wrapper/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-wrapper

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Unified-Inbox-APK
        path: android-wrapper/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Unified-Inbox-Release-APK
        path: android-wrapper/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: error